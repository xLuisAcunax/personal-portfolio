<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluxo - Animation Library Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0b0f19;
        --card-bg: rgba(255, 255, 255, 0.03);
        --card-border: rgba(255, 255, 255, 0.08);
        --primary: #8b5cf6;
        --secondary: #ec4899;
        --text: #f3f4f6;
        --text-muted: #9ca3af;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--bg-color);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(139, 92, 246, 0.15) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            rgba(236, 72, 153, 0.15) 0px,
            transparent 50%
          );
      }

      .container {
        max-width: 900px;
        width: 100%;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      h1 {
        font-size: 3.5rem;
        font-weight: 800;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
        letter-spacing: -0.05em;
      }

      p.subtitle {
        color: var(--text-muted);
        font-size: 1.2rem;
        margin-bottom: 1.5rem;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 24px;
        padding: 2.5rem;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }

      .stage {
        background: rgba(0, 0, 0, 0.2);
        border: 1px dashed var(--card-border);
        border-radius: 16px;
        height: 250px;
        width: 100%;
        position: relative;
        display: flex;
        align-items: center;
        padding: 0 40px;
        overflow: hidden;
      }

      .box {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        cursor: pointer;
      }

      .stagger-container {
        display: none;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
      }

      .mini-box {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        border-radius: 12px;
        box-shadow: 0 6px 15px rgba(236, 72, 153, 0.3);
      }

      .controls {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      button {
        font-family: inherit;
        font-weight: 600;
        font-size: 0.95rem;
        padding: 0.8rem 1.6rem;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
      }

      .btn-primary:hover {
        background: #7c3aed;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border: 1px solid var(--card-border);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      .console {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 1rem;
        font-family: "Courier New", Courier, monospace;
        font-size: 0.85rem;
        color: #34d399;
        height: 120px;
        overflow-y: auto;
        width: 100%;
      }

      .console-line {
        margin-bottom: 0.25rem;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div style="text-align: center">
        <h1>Fluxo</h1>
        <p class="subtitle">
          A lightweight, professional, and efficient animation library
        </p>
      </div>

      <div class="card">
        <div class="stage">
          <div class="box" id="box"></div>
          <div class="stagger-container" id="stagger-container">
            <div class="mini-box"></div>
            <div class="mini-box"></div>
            <div class="mini-box"></div>
            <div class="mini-box"></div>
            <div class="mini-box"></div>
          </div>
        </div>

        <div class="controls">
          <button class="btn-primary" id="btn-animate">Run .to()</button>
          <button
            class="btn-primary"
            id="btn-from"
            style="
              background: var(--secondary);
              box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
            "
          >
            Run .from()
          </button>
          <button
            class="btn-primary"
            id="btn-from-to"
            style="
              background: linear-gradient(
                135deg,
                var(--primary),
                var(--secondary)
              );
            "
          >
            Run .fromTo()
          </button>
          <button
            class="btn-primary"
            id="btn-stagger"
            style="
              background: #3b82f6;
              box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            "
          >
            Run Stagger
          </button>
          <button
            class="btn-primary"
            id="btn-loop"
            style="
              background: #eab308;
              box-shadow: 0 4px 15px rgba(234, 179, 8, 0.3);
            "
          >
            Run Loop
          </button>
          <button
            class="btn-primary"
            id="btn-timeline"
            style="
              background: #10b981;
              box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            "
          >
            Run Timeline
          </button>

          <button class="btn-secondary" id="btn-tl-pause">Pause Anim</button>
          <button class="btn-secondary" id="btn-tl-resume">Resume Anim</button>
          <button
            class="btn-secondary"
            id="btn-tl-reverse"
            style="border-color: #ec4899; color: #ec4899"
          >
            Reverse Anim
          </button>
          <button class="btn-secondary" id="btn-scale">Pulse</button>
          <button class="btn-secondary" id="btn-fade">Fade Out</button>
          <button class="btn-secondary" id="btn-reset">Reset</button>
        </div>

        <div class="console" id="console">
          <div class="console-line">
            > System ready. Test loops, staggers and timelines!
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { fluxo } from "../../dist/index.js";
      const box = document.getElementById("box");
      const staggerContainer = document.getElementById("stagger-container");
      const consoleEl = document.getElementById("console");

      let activeAnimation = null;
      function log(message) {
        const line = document.createElement("div");
        line.className = "console-line";
        line.textContent = `> ${new Date().toLocaleTimeString()}: ${message}`;
        consoleEl.appendChild(line);
        consoleEl.scrollTop = consoleEl.scrollHeight;
      }

      function showStageMode(mode) {
        if (mode === "single") {
          box.style.display = "block";
          staggerContainer.style.display = "none";
        } else {
          box.style.display = "none";
          staggerContainer.style.display = "flex";
        }
      }

      function startAnimation(anim) {
        if (activeAnimation) {
          activeAnimation.kill();
        }
        activeAnimation = anim;
      }

      document.getElementById("btn-animate").addEventListener("click", () => {
        showStageMode("single");
        log("Running: fluxo.to(box, { x: 300, rotation: 360, duration: 1.5 })");

        const anim = fluxo.to(box, {
          x: 300,
          rotation: 360,
          duration: 1.5,
          ease: "medium.out",
          onStart: () => log(".to() animation started!"),
          onComplete: () => log(".to() animation complete!"),
        });
        startAnimation(anim);
      });

      document.getElementById("btn-from").addEventListener("click", () => {
        showStageMode("single");
        log(
          "Running: fluxo.from(box, { x: 300, rotation: 180, duration: 1.5 })",
        );

        const anim = fluxo.from(box, {
          x: 300,
          rotation: 180,
          duration: 1.5,
          ease: "medium.out",
          onStart: () => log(".from() animation started!"),
          onComplete: () => log(".from() animation complete!"),
        });
        startAnimation(anim);
      });

      document.getElementById("btn-from-to").addEventListener("click", () => {
        showStageMode("single");
        log(
          "Running: fluxo.fromTo(box, { x: -50, scale: 0.5 }, { x: 250, scale: 1.2, duration: 1.5 })",
        );

        const anim = fluxo.fromTo(
          box,
          {
            x: -50,
            scale: 0.5,
          },
          {
            x: 250,
            scale: 1.2,
            duration: 1.5,
            ease: "medium.out",
            onStart: () => log(".fromTo() animation started!"),
            onComplete: () => log(".fromTo() animation complete!"),
          },
        );
        startAnimation(anim);
      });

      document.getElementById("btn-stagger").addEventListener("click", () => {
        showStageMode("stagger");
        log(
          'Running: fluxo.fromTo(".mini-box", { y: -100, opacity: 0, scale: 0.2 }, { y: 0, opacity: 1, scale: 1, stagger: 0.15 })',
        );
        const anim = fluxo.fromTo(
          ".mini-box",
          {
            y: -100,
            opacity: 0,
            scale: 0.2,
          },
          {
            y: 0,
            opacity: 1,
            scale: 1,
            duration: 0.8,
            stagger: 0.15,
            ease: "medium.out",
            onStart: () => log("Stagger animation started!"),
            onComplete: () => log("Stagger complete! All 5 boxes animated."),
          },
        );
        startAnimation(anim);
      });

      document.getElementById("btn-loop").addEventListener("click", () => {
        showStageMode("single");
        log(
          "Running: fluxo.to(box, { x: 200, rotation: 180, scale: 1.3, repeat: -1, alternate: true })",
        );
        const anim = fluxo.to(box, {
          x: 200,
          rotation: 180,
          scale: 1.3,
          duration: 1.0,
          ease: "medium.inOut",
          repeat: -1,
          alternate: true,
          onStart: () => log("Loop animation started!"),
          onRepeat: () => log("Loop repeat cycle completed! (Alternate toggled)"),
        });
        startAnimation(anim);
      });

      document.getElementById("btn-timeline").addEventListener("click", () => {
        showStageMode("single");
        log("Creating and playing new Timeline...");

        box.style.transform =
          "translate3d(0px, 0px, 0px) rotate(0deg) scale(1)";
        box.style.opacity = "1";
        const tl = fluxo.timeline({
          onStart: () => log("Timeline started!"),
          onComplete: () => log("Timeline finished!"),
        });
        tl.to(box, { x: 250, duration: 1.0, ease: "medium.out" })
          .to(box, { y: 60, duration: 0.8, ease: "medium.out" })
          .to(box, { rotation: 180, duration: 0.6, ease: "medium.inOut" })
          .to(
            box,
            { scale: 0.5, opacity: 0.4, duration: 0.6, ease: "slow.out" },
            "<",
          );
        startAnimation(tl);
      });

      document.getElementById("btn-tl-pause").addEventListener("click", () => {
        if (activeAnimation) {
          log("Animation paused.");
          activeAnimation.pause();
        } else {
          log("No active animation to pause.");
        }
      });

      document.getElementById("btn-tl-resume").addEventListener("click", () => {
        if (activeAnimation) {
          log("Animation resumed.");
          activeAnimation.play();
        } else {
          log("No active animation to resume.");
        }
      });

      document
        .getElementById("btn-tl-reverse")
        .addEventListener("click", () => {
          if (activeAnimation) {
            log("Reversing active animation...");
            activeAnimation.reverse();
          } else {
            log("No active animation to reverse.");
          }
        });

      document.getElementById("btn-reset").addEventListener("click", () => {
        log("Resetting stage to default origin...");
        showStageMode("single");

        const anim = fluxo.to(box, {
          x: 0,
          y: 0,
          rotation: 0,
          scale: 1,
          opacity: 1,
          duration: 0.8,
          ease: "slow.out",
          onComplete: () => log("Reset complete"),
        });
        startAnimation(anim);
      });

      document.getElementById("btn-scale").addEventListener("click", () => {
        showStageMode("single");
        log("Starting pulse...");

        const anim = fluxo.to(box, {
          scale: 1.4,
          rotation: 180,
          duration: 0.6,
          ease: "medium.out",
          onComplete: () => {
            const followAnim = fluxo.to(box, {
              scale: 1,
              rotation: 360,
              duration: 0.6,
              ease: "slow.inOut",
            });
            startAnimation(followAnim);
          },
        });
        startAnimation(anim);
      });

      document.getElementById("btn-fade").addEventListener("click", () => {
        showStageMode("single");
        log("Fading out...");

        const anim = fluxo.to(box, {
          opacity: 0.2,
          duration: 1,
          ease: "slow.out",
        });
        startAnimation(anim);
      });
    </script>
  </body>
</html>
